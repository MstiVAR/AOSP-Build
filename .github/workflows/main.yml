name: AOSP Android 4 Derleme Hazirligi
on: [push]

jobs:
  hazirlik-ve-derleme:
    runs-on: ubuntu-22.04
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Ubuntu Sistemini Guncelle ve Gerekli Paketleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev libz1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip m4 python3

      - name: Eski Android Sürümleri İçin Java Kurulumu
        run: |
          sudo apt-get install -y openjdk-8-jdk
          echo "Java başarıyla kuruldu!"

      - name: Google Repo Aracini Kur
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "Google Repo aracı başarıyla kuruldu!"
          
